<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AI实践指引｜模块化操作手册</title><link rel="stylesheet" href="assets/style.css"></head><body class="guide-body"><a href="index.html" class="home-button">返回首页</a><header class="guide-hero"><div class="slide-kicker">Practice Guide</div><h1>AI 实践指引</h1><p>每个模块都是一个实践按钮，点击后查看详细介绍、操作步骤、提示词样例和提交要求。</p></header><main class="guide-layout"><aside class="module-menu"><button class="module-btn" data-i="0"><small>Prompt 实践</small><strong>BROKE 提示词优化</strong><span>把一句模糊需求改成结构化 Prompt。</span></button><button class="module-btn" data-i="1"><small>Agent 实践</small><strong>百炼 Agent：招生咨询助手</strong><span>创建回答客户问题并引导下一步沟通的招生 Agent。</span></button><button class="module-btn" data-i="2"><small>Agent 实践</small><strong>百炼 Agent：海报设计提示词助手</strong><span>把视觉需求整理成 AI 绘图 Prompt。</span></button><button class="module-btn" data-i="3"><small>Memory 实践</small><strong>长期记忆需求诊断</strong><span>判断哪些信息应该进入 skill.md、memory.md、reflection.md。</span></button><button class="module-btn" data-i="4"><small>Claw 实践</small><strong>Claw 长期记忆架构</strong><span>用文件型 Memory 设计一个长期成长 Agent。</span></button><button class="module-btn" data-i="5"><small>Workflow 实践</small><strong>自动化报告工作流</strong><span>把复杂任务拆成节点。</span></button><button class="module-btn" data-i="6"><small>Multi-Agent 实践</small><strong>AI 团队分工</strong><span>设计多个 Agent 协作完成一个任务。</span></button><button class="module-btn" data-i="7"><small>RAG 实践</small><strong>教育知识库设计</strong><span>设计教材、题库、FAQ 的知识库结构。</span></button><button class="module-btn" data-i="8"><small>系统设计</small><strong>AI 教育系统 MVP</strong><span>整合 RAG + Memory + Workflow。</span></button><button class="module-btn" data-i="9"><small>岗位实战</small><strong>推广 / 策划 / 设计 / 销售案例</strong><span>把 AI 工程化能力应用到真实岗位。</span></button></aside><section class="module-detail" id="moduleDetail"></section></main><script>const modules=[('Prompt 实践', 'BROKE 提示词优化', '把一句模糊需求改成结构化 Prompt。', '请使用 BROKE 框架优化：帮我写一个招生文案。'), ('Agent 实践', '百炼 Agent：招生咨询助手', '创建回答客户问题并引导下一步沟通的招生 Agent。', '你是教育培训行业招生咨询助手，请输出【问题类型】【用户焦虑】【建议回复】【后续追问】【注意事项】。'), ('Agent 实践', '百炼 Agent：海报设计提示词助手', '把视觉需求整理成 AI 绘图 Prompt。', '你是广告视觉设计提示词助手，请输出【需求理解】【视觉风格】【画面结构】【AI绘图提示词】【负面提示词】。'), ('Memory 实践', '长期记忆需求诊断', '判断哪些信息应该进入 skill.md、memory.md、reflection.md。', '请诊断这个 AI 使用场景是否需要长期记忆，并输出三类文件应该记录什么。'), ('Claw 实践', 'Claw 长期记忆架构', '用文件型 Memory 设计一个长期成长 Agent。', '请为一个 AI 岗位设计 skill.md、memory.md、reflection.md 和运行流程。'), ('Workflow 实践', '自动化报告工作流', '把复杂任务拆成节点。', '请把学习报告任务拆成输入、分析、生成、审核、输出节点。'), ('Multi-Agent 实践', 'AI 团队分工', '设计多个 Agent 协作完成一个任务。', '请设计 Leader Agent、分析 Agent、内容 Agent、记忆 Agent、Reflection Agent 的分工。'), ('RAG 实践', '教育知识库设计', '设计教材、题库、FAQ 的知识库结构。', '请为一个课程设计知识库目录、切分规则和测试问题。'), ('系统设计', 'AI 教育系统 MVP', '整合 RAG + Memory + Workflow。', '请设计一个 AI 教育系统 MVP，包括系统目标、模块、数据闭环和最小功能。'), ('岗位实战', '推广 / 策划 / 设计 / 销售案例', '把 AI 工程化能力应用到真实岗位。', '请选择一个岗位，设计对应的 AI 工作系统。')];const detail=document.getElementById('moduleDetail');const btns=document.querySelectorAll('.module-btn');function render(i){const m=modules[i];btns.forEach(b=>b.classList.remove('active'));btns[i].classList.add('active');detail.innerHTML=`<div class="detail-header"><small>${m[0]}</small><h2>${m[1]}</h2><p>${m[2]}</p></div><div class="detail-grid"><div class="detail-card"><h3>模块目标</h3><p>${m[2]}</p></div><div class="detail-card"><h3>操作步骤</h3><ol><li>明确业务场景</li><li>拆解任务目标</li><li>选择 Prompt / Agent / Workflow / Memory 方案</li><li>编写提示词或配置规则</li><li>用真实问题测试并优化</li></ol></div><div class="detail-card full"><h3>提示词样例</h3><pre>${m[3]}</pre></div><div class="detail-card warn"><h3>常见错误</h3><ul><li>只看工具操作，不理解设计逻辑。</li><li>没有真实测试问题。</li><li>没有输出格式和边界限制。</li><li>没有复盘优化记录。</li></ul></div><div class="detail-card"><h3>提交要求</h3><ul><li>模块设计说明</li><li>提示词或配置截图</li><li>测试结果截图</li><li>优化记录</li></ul></div></div>`}btns.forEach((b,i)=>b.addEventListener('click',()=>render(i)));render(0);</script></body></html>
