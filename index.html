<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信小程序设计课</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #666;
            font-size: 1.1rem;
        }

        .course-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .course-card {
            background: white;
            border-radius: 16px;
            padding: 24px 28px;
            display: flex;
            align-items: center;
            gap: 20px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            border: 1px solid #e5e5e5;
        }

        .course-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.1);
            border-color: #667eea;
        }

        .course-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            flex-shrink: 0;
        }

        .course-info {
            flex: 1;
        }

        .course-info h3 {
            font-size: 1.2rem;
            margin-bottom: 4px;
            color: #1d1d1f;
        }

        .course-info p {
            color: #888;
            font-size: 0.9rem;
        }

        .course-arrow {
            color: #ccc;
            font-size: 1.5rem;
            transition: transform 0.3s;
        }

        .course-card:hover .course-arrow {
            transform: translateX(4px);
            color: #667eea;
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid #e5e5e5;
            color: #999;
            font-size: 0.85rem;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .course-card {
                padding: 20px;
            }

            .course-icon {
                width: 48px;
                height: 48px;
                font-size: 1.5rem;
            }

            .course-info h3 {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>微信小程序设计课</h1>
            <p>学习设计原则，打造优秀用户体验</p>
        </div>

        <div class="course-list">
            <a href="ui_design/" class="course-card">
                <div class="course-icon">🎨</div>
                <div class="course-info">
                    <h3>UI设计八大原则</h3>
                    <p>可见性、反馈、导航、一致性、简洁...</p>
                </div>
                <div class="course-arrow">›</div>
            </a>
     
            <a href="miniprogram-projects/" class="course-card">
                <div class="course-icon">📱</div>
                <div class="course-info">
                    <h3>小程序项目实践</h3>
                    <p>介绍类项目、个人效率类、社交创意类</p>
                </div>
                <div class="course-arrow">›</div>
            </a>
        
               <!-- 可以继续添加更多课程 -->
            <!--
            <a href="other_course/" class="course-card">
                <div class="course-icon">📱</div>
                <div class="course-info">
                    <h3>课程名称</h3>
                    <p>课程简介...</p>
                </div>
                <div class="course-arrow">›</div>
            </a>
            -->
        </div>

        <div class="footer">
            <p>微信小程序设计课 · 2026</p>
        </div>
    </div>
</body>
</html>
