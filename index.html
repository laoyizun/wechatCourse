<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信小程序课程</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #666;
            font-size: 1.1rem;
        }

        /* 切换按钮样式 */
        .tab-switch {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .tab-btn {
            padding: 12px 32px;
            border: 2px solid #667eea;
            border-radius: 30px;
            background: transparent;
            color: #667eea;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .tab-btn:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .tab-btn.inactive {
            background: #e5e5e5;
            border-color: #d0d0d0;
            color: #888;
        }

        .tab-btn.inactive:hover {
            background: #d8d8d8;
        }

        .course-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .course-card {
            background: white;
            border-radius: 16px;
            padding: 24px 28px;
            display: flex;
            align-items: center;
            gap: 20px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            border: 1px solid #e5e5e5;
        }

        .course-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.1);
            border-color: #667eea;
        }

        .course-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            flex-shrink: 0;
        }

        .course-info {
            flex: 1;
        }

        .course-info h3 {
            font-size: 1.2rem;
            margin-bottom: 4px;
            color: #1d1d1f;
        }

        .course-info p {
            color: #888;
            font-size: 0.9rem;
        }

        .course-arrow {
            color: #ccc;
            font-size: 1.5rem;
            transition: transform 0.3s;
        }

        .course-card:hover .course-arrow {
            transform: translateX(4px);
            color: #667eea;
        }

        /* 隐藏状态 */
        .hidden {
            display: none;
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid #e5e5e5;
            color: #999;
            font-size: 0.85rem;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .course-card {
                padding: 20px;
            }

            .course-icon {
                width: 48px;
                height: 48px;
                font-size: 1.5rem;
            }

            .course-info h3 {
                font-size: 1.1rem;
            }

            .tab-btn {
                padding: 10px 24px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>微信小程序课程</h1>
            <p>Coding for fun！</p>
        </div>

        <!-- 切换按钮 -->
        <div class="tab-switch">
            <button class="tab-btn active" id="studentTab" onclick="switchTab('student')">学生</button>
            <button class="tab-btn inactive" id="teacherTab" onclick="switchTab('teacher')">教师</button>
        </div>

        <!-- 学生列表 -->
        <div class="course-list" id="studentList">
            <a href="data-storage/" class="course-card">
                <div class="course-icon">🔢</div>
                <div class="course-info">
                    <h3>小程序数据的存储方式</h3>
                    <p>页面静态数据、本地缓存、云数据库</p>
                </div>
                <div class="course-arrow">›</div>
            </a>

            <a href="ui_design/" class="course-card">
                <div class="course-icon">🎨</div>
                <div class="course-info">
                    <h3>UI设计八大原则</h3>
                    <p>可见性、反馈、导航、一致性、简洁...</p>
                </div>
                <div class="course-arrow">›</div>
            </a>

            <a href="miniprogram-projects/" class="course-card">
                <div class="course-icon">📱</div>
                <div class="course-info">
                    <h3>小程序项目实践</h3>
                    <p>介绍类项目、个人效率类、社交创意类</p>
                </div>
                <div class="course-arrow">›</div>
            </a>
        </div>

        <!-- 教师列表 -->
        <div class="course-list hidden" id="teacherList">
            <a href="https://laoyizun.github.io/wechatCourse/ppt-ai-teaching/" class="course-card" target="_blank">
                <div class="course-icon">🤖</div>
                <div class="course-info">
                    <h3>AI 教学实践</h3>
                    <p>人工智能在教学中的创新应用</p>
                </div>
                <div class="course-arrow">›</div>
            </a>
        </div>

        <div class="footer">
            <p>方块鸟 · 大尊</p>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            const studentTab = document.getElementById('studentTab');
            const teacherTab = document.getElementById('teacherTab');
            const studentList = document.getElementById('studentList');
            const teacherList = document.getElementById('teacherList');

            if (tab === 'student') {
                studentTab.classList.add('active');
                studentTab.classList.remove('inactive');
                teacherTab.classList.remove('active');
                teacherTab.classList.add('inactive');
                studentList.classList.remove('hidden');
                teacherList.classList.add('hidden');
            } else {
                teacherTab.classList.add('active');
                teacherTab.classList.remove('inactive');
                studentTab.classList.remove('active');
                studentTab.classList.add('inactive');
                teacherList.classList.remove('hidden');
                studentList.classList.add('hidden');
            }
        }
    </script>

    }

    // 检查是否是交互元素，这些元素需要保留默认行为
    var isInteractiveElement = ['input', 'textarea', 'select', 'button', 'a'].includes(target.tagName.toLowerCase());

    // 如果高亮功能启用，对于非交互元素阻止默认行为和事件传播
    if (highlightEnabled) {
      e.preventDefault();
      e.stopPropagation();
    }
    var rect = target.getBoundingClientRect();
    var selector = getElementSelector(target);
    var text = getElementText(target);
    var attributes = getElementAttributes(target);
    console.log("Element clicked:", {
      tagName: target.tagName,
      selector: selector,
      rect: rect
    });

    // 立即更新选中高亮
    updateSelectedHighlight(target);

    // 隐藏悬停高亮，因为现在是选中状态
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    var elementInfo = {
      tagName: target.tagName.toLowerCase(),
      rect: {
        left: rect.left,
        top: rect.top,
        right: rect.right,
        bottom: rect.bottom,
        width: rect.width,
        height: rect.height,
        x: rect.x,
        y: rect.y
      },
      selector: selector,
      text: text,
      attributes: attributes,
      url: window.location.href,
      path: window.location.pathname,
      timestamp: Date.now()
    };
    try {
      window.parent.postMessage({
        type: "iframe-element-click",
        data: elementInfo,
        source: "iframe-highlight-injector"
      }, "*");
    } catch (error) {
      console.warn("无法发送消息到父窗口:", error);
    }
  }

  // 监听来自父窗口的消息
  function handleParentMessage(event) {
    console.log("Received message from parent:", event.data);
    if (event.data.type === "iframe-highlight-toggle") {
      var enabled = event.data.enabled;
      console.log("Highlight toggle:", enabled);
      if (enabled) {
        enableHighlight();
      } else {
        disableHighlight();
      }
    } else if (event.data.type === "enable-iframe-highlight") {
      console.log("Enable iframe highlight");
      enableHighlight();
    } else if (event.data.type === "disable-iframe-highlight") {
      console.log("Disable iframe highlight");
      disableHighlight();
    } else if (event.data.type === "toggle-iframe-highlight") {
      var _enabled = event.data.enabled !== undefined ? event.data.enabled : !highlightEnabled;
      console.log("Toggle iframe highlight to:", _enabled);
      if (_enabled) {
        enableHighlight();
      } else {
        disableHighlight();
      }
    } else if (event.data.type === "update-selected-element") {
      var selector = event.data.selector;
      console.log("Update selected element with selector:", selector);
      if (selector) {
        try {
          var element = document.querySelector(selector);
          console.log("Found element by selector:", element);
          updateSelectedHighlight(element);
        } catch (error) {
          console.warn("Failed to select element:", error);
          updateSelectedHighlight(null);
        }
      } else {
        updateSelectedHighlight(null);
      }
    } else if (event.data.type === "clear-selected-element") {
      console.log("Clear selected element");
      updateSelectedHighlight(null);
    }
  }

  // 启用高亮功能
  function enableHighlight() {
    console.log("Enabling highlight");
    document.addEventListener("mouseover", handleMouseOver, true);
    document.addEventListener("mouseout", handleMouseOut, true);
    document.addEventListener("click", handleClick, true);
    highlightEnabled = true;
    overlay.style.display = "block";
  }

  // 禁用高亮功能
  function disableHighlight() {
    console.log("Disabling highlight");
    highlightEnabled = false;
    // 保持事件监听器，但通过 highlightEnabled 变量控制行为
    // 这样可以保留选中状态的显示
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    // 不隐藏 selectedBox 和 selectedLabel，保留选中状态
  }

  // 完全禁用高亮功能（移除所有监听器）
  function fullyDisableHighlight() {
    console.log("Fully disabling highlight");
    highlightEnabled = false;
    document.removeEventListener("mouseover", handleMouseOver, true);
    document.removeEventListener("mouseout", handleMouseOut, true);
    document.removeEventListener("click", handleClick, true);
    overlay.style.display = "none";
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    selectedBox.style.display = "none";
    selectedLabel.style.display = "none";
  }

  // 添加事件监听
  enableHighlight();
  window.addEventListener("message", handleParentMessage);

  // 暴露全局函数供外部调用
  window.__iframeHighlightControl = {
    enable: enableHighlight,
    disable: disableHighlight,
    fullyDisable: fullyDisableHighlight,
    isEnabled: function isEnabled() {
      return highlightEnabled;
    },
    getSelectedElement: function getSelectedElement() {
      return selectedElement;
    },
    updateSelected: updateSelectedHighlight,
    // 通过消息发送开关控制
    sendToggleMessage: function sendToggleMessage(enabled) {
      window.parent.postMessage({
        type: 'iframe-highlight-status',
        enabled: enabled || highlightEnabled,
        source: 'iframe-highlight-injector'
      }, '*');
    }
  };

  // 通知父窗口脚本已加载
  try {
    window.parent.postMessage({
      type: "iframe-highlight-ready",
      data: {
        url: window.location.href,
        userAgent: navigator.userAgent,
        timestamp: Date.now()
      },
      source: "iframe-highlight-injector"
    }, "*");
  } catch (error) {
    console.warn("无法发送就绪消息到父窗口:", error);
  }

  // 清理函数
  window.__iframeHighlightCleanup = function () {
    fullyDisableHighlight();
    window.removeEventListener("message", handleParentMessage);
    if (overlay.parentElement) {
      overlay.parentElement.removeChild(overlay);
    }
    delete window.__iframeHighlightInitialized;
    delete window.__iframeHighlightCleanup;
  };
})();

</script>
</body>
</html>
